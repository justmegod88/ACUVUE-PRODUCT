<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>ASD™ 편안한 시야</title>

  <style>
    :root{
      --acuvue-blue:#005EB8;
      --acuvue-blue-2:#1E78D6;
      --panel-bg:#dfe8f3;
      --panel-border:#c7d4e6;
      --text:#0c1f35;
      --text-sub:#46607c;
      --shadow:0 18px 44px rgba(10,30,55,.20);
      --blue-soft:#4f8cff;
      --red-soft:#e45b5b;
      --pill-deep:#0f5f8d;
      --pill-mid:#1d6f9f;
      --pill-off:#2b84bb;
    }

    *{ box-sizing:border-box; }
    html,body{
      margin:0;
      height:100%;
      background:#000;
      font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",sans-serif;
      color:var(--text);
      overflow:hidden;
    }

    .wrap{
      min-height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:12px;
    }

    .modal{
      width:min(820px, 96vw);
      border-radius:24px;
      overflow:hidden;
      background:#fff;
      border:1px solid rgba(255,255,255,.18);
      box-shadow:var(--shadow);
    }

    .modal-head{
      height:76px;
      background:#dbe5f1;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 26px;
      border-bottom:1px solid rgba(10,30,55,.08);
    }
    .modal-title{
      font-size:28px;
      font-weight:900;
      color:#000;
      letter-spacing:-.5px;
    }
    .modal-close{
      border:none;
      background:transparent;
      font-size:34px;
      line-height:1;
      color:#000;
      cursor:pointer;
      padding:0;
      width:44px;
      height:44px;
    }

    .scene{
      position:relative;
      height:min(64vw, 540px);
      min-height:420px;
      background:#efefef url('face.png') center center / cover no-repeat;
      overflow:hidden;
    }

    /* 파일이 없을 때를 대비한 배경 */
    .scene::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(110px 140px at 38% 46%, rgba(255,255,255,.40), rgba(255,255,255,0) 60%),
        radial-gradient(110px 140px at 62% 46%, rgba(255,255,255,.40), rgba(255,255,255,0) 60%),
        linear-gradient(180deg, rgba(255,255,255,.0), rgba(0,0,0,.0));
      pointer-events:none;
      z-index:0;
    }

    /* A 시표 */
    .target-stage{
      position:absolute;
      left:50%;
      top:46%;
      width:148px;
      height:226px;
      transform:translate(-50%,-50%);
      z-index:3;
      transition:top .35s ease;
    }

    .target-bg{
      position:absolute;
      inset:0;
      border-radius:18px;
      background:rgba(255,220,235,.54);
      border:2px solid rgba(255,255,255,.68);
      backdrop-filter: blur(2px);
      box-shadow:0 8px 24px rgba(0,0,0,.08);
    }

    .target-half{
      position:absolute;
      left:0;
      width:100%;
      height:50%;
      overflow:hidden;
      transition:transform .55s cubic-bezier(.22,.8,.22,1);
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .target-half.top{ top:0; }
    .target-half.bottom{ top:50%; }

    .target-a{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      font-size:130px;
      font-weight:300;
      letter-spacing:-8px;
      line-height:1;
      transition:color .35s ease;
      font-family:Georgia, "Times New Roman", serif;
      user-select:none;
    }

    .target-stage.is-off .target-a{ color:var(--blue-soft); }
    .target-stage.is-on .target-a{ color:var(--red-soft); }

    /* OFF = 정상 */
    .target-stage.is-off .target-half.top,
    .target-stage.is-off .target-half.bottom{
      transform:translateY(0);
    }

    /* ON = 프리즘 영향 : 위아래 분리 */
    .target-stage.is-on .target-half.top{
      transform:translateY(-16px);
    }
    .target-stage.is-on .target-half.bottom{
      transform:translateY(16px);
    }

    /* 시선 가이드 */
    .guide-line{
      position:absolute;
      height:0;
      border-top:6px dashed;
      width:86px;
      opacity:.95;
      z-index:2;
      transition:all .45s ease;
      transform-origin:center;
    }
    .guide-line.left{
      left:38%;
      top:46%;
      border-color:var(--red-soft);
      transform:translate(-100%,-50%) rotate(5deg);
    }
    .guide-line.right{
      left:62%;
      top:46%;
      border-color:var(--blue-soft);
      transform:translate(0,-50%) rotate(-5deg);
    }

    .target-stage.is-on ~ .guide-line.left{
      transform:translate(-100%,-50%) rotate(10deg) translateY(-6px);
    }
    .target-stage.is-on ~ .guide-line.right{
      transform:translate(0,-50%) rotate(-10deg) translateY(6px);
    }

    .target-stage.is-off ~ .guide-line.left{
      transform:translate(-100%,-50%) rotate(2deg);
    }
    .target-stage.is-off ~ .guide-line.right{
      transform:translate(0,-50%) rotate(-2deg);
    }

    /* 광학 요소: 사람의 왼쪽 눈(화면 오른쪽) */
    .optic{
      position:absolute;
      left:58%;
      top:46%;
      width:48px;
      height:110px;
      transform:translate(-50%,-50%);
      z-index:4;
      transition:all .4s ease;
      pointer-events:none;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .target-stage.is-on ~ .optic{
      transform:translate(-50%,-50%) translateY(-6px);
    }

    .optic-prism,
    .optic-flat{
      position:absolute;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
    }

    /* 프리즘 */
    .optic-prism::before{
      content:"";
      position:absolute;
      left:50%;
      bottom:6px;
      transform:translateX(-50%);
      width:0;
      height:0;
      border-left:22px solid transparent;
      border-right:22px solid transparent;
      border-bottom:90px solid rgba(143,212,255,.82);
      filter:drop-shadow(0 4px 8px rgba(0,0,0,.12));
    }

    /* 플랫 바 */
    .optic-flat::before{
      content:"";
      position:absolute;
      inset:6px 6px;
      border-radius:14px;
      background:linear-gradient(180deg, rgba(255,255,255,.58), rgba(196,226,255,.70));
      border:1px solid rgba(255,255,255,.72);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.40),
        0 4px 10px rgba(0,0,0,.10);
    }

    .scene.mode-on .optic-prism{ display:flex; }
    .scene.mode-off .optic-flat{ display:flex; }

    /* 프리즘 컨트롤 */
    .prism-pill{
      position:absolute;
      left:50%;
      bottom:16px;
      transform:translateX(-50%);
      width:min(92%, 760px);
      height:86px;
      border-radius:999px;
      overflow:hidden;
      display:flex;
      z-index:5;
      border:5px solid #0b4060;
      box-shadow:0 10px 18px rgba(0,0,0,.16);
      background:#0f5f8d;
    }

    .pill-label,
    .pill-btn{
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:#fff;
      border:none;
      background:transparent;
      padding:0 16px;
      font-weight:800;
      letter-spacing:-.4px;
    }

    .pill-label{
      flex:1.15;
      background:#166f9d;
      font-size:28px;
      line-height:1.05;
    }

    .pill-btn{
      flex:1;
      font-size:28px;
      cursor:pointer;
      transition:background .22s ease, color .22s ease, box-shadow .22s ease;
      position:relative;
    }

    .pill-btn + .pill-btn{
      border-left:5px solid #0b4060;
    }

    .pill-btn.on{
      background:linear-gradient(180deg, #2d89c0, #176e9c);
      box-shadow:inset 0 0 0 2px rgba(255,255,255,.10);
    }

    .pill-btn.off{
      background:#2476a7;
      opacity:.92;
    }

    .pill-btn.active{
      background:linear-gradient(180deg, #4ca4d9, #2a82b7);
      color:#fff;
      box-shadow:inset 0 0 0 2px rgba(255,255,255,.14);
    }

    /* 하단 메시지 */
    .message{
      background:#dbe5f1;
      padding:28px 34px 30px;
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:20px;
      border-top:1px solid rgba(10,30,55,.08);
    }

    .message-copy{
      flex:1 1 auto;
      font-size:28px;
      line-height:1.34;
      font-weight:900;
      letter-spacing:-.6px;
      color:#000;
      word-break:keep-all;
    }
    .message-copy .blue{
      color:var(--acuvue-blue);
    }

    .confirm-btn{
      flex:0 0 auto;
      min-width:120px;
      height:86px;
      padding:0 26px;
      border:none;
      border-radius:18px;
      background:#1168d0;
      color:#fff;
      font-size:24px;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 10px 22px rgba(17,104,208,.22);
    }

    @media (max-width: 820px){
      .modal-title{ font-size:20px; }
      .scene{ height:520px; min-height:360px; }
      .target-stage{
        width:120px;
        height:188px;
      }
      .target-a{ font-size:108px; }
      .prism-pill{
        height:78px;
        bottom:12px;
      }
      .pill-label,
      .pill-btn{
        font-size:22px;
      }
      .message{
        padding:22px 18px 22px;
        gap:14px;
      }
      .message-copy{
        font-size:22px;
      }
      .confirm-btn{
        min-width:98px;
        height:74px;
        font-size:20px;
        border-radius:16px;
      }
      .optic{
        width:42px;
        height:96px;
      }
      .optic-prism::before{
        border-left-width:19px;
        border-right-width:19px;
        border-bottom-width:78px;
      }
    }

    @media (max-width: 560px){
      .wrap{ padding:8px; }
      .modal{ width:100%; border-radius:20px; }
      .modal-head{
        height:60px;
        padding:0 18px;
      }
      .modal-title{ font-size:18px; }
      .modal-close{ font-size:26px; width:34px; height:34px; }

      .scene{
        height:320px;
        min-height:320px;
      }

      .target-stage{
        width:82px;
        height:132px;
        top:46%;
      }
      .target-a{
        font-size:72px;
        letter-spacing:-4px;
      }

      .guide-line{
        width:54px;
        border-top-width:5px;
      }

      .optic{
        left:58%;
        top:46%;
        width:32px;
        height:72px;
      }
      .optic-prism::before{
        border-left-width:14px;
        border-right-width:14px;
        border-bottom-width:56px;
      }
      .optic-flat::before{
        inset:4px;
        border-radius:10px;
      }

      .prism-pill{
        width:min(94%, 420px);
        height:66px;
        bottom:10px;
        border-width:4px;
      }
      .pill-label{
        font-size:16px;
        padding:0 10px;
      }
      .pill-btn{
        font-size:16px;
        padding:0 8px;
      }
      .pill-btn + .pill-btn{
        border-left-width:4px;
      }

      .message{
        padding:18px 14px 18px;
        gap:12px;
      }
      .message-copy{
        font-size:17px;
        line-height:1.38;
      }
      .confirm-btn{
        min-width:82px;
        height:58px;
        font-size:16px;
        border-radius:14px;
        padding:0 18px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="modal">
      <div class="modal-head">
        <div class="modal-title">ASD™ 편안한 시야</div>
        <button class="modal-close" type="button" onclick="closeDemo()">X</button>
      </div>

      <div id="scene" class="scene mode-off">
        <div id="targetStage" class="target-stage is-off">
          <div class="target-bg"></div>

          <div class="target-half top">
            <div class="target-a">A</div>
          </div>
          <div class="target-half bottom">
            <div class="target-a">A</div>
          </div>
        </div>

        <div class="guide-line left"></div>
        <div class="guide-line right"></div>

        <div class="optic">
          <div class="optic-prism"></div>
          <div class="optic-flat"></div>
        </div>

        <div class="prism-pill">
          <div class="pill-label">단안 프리즘</div>
          <button id="btnOn" class="pill-btn on" type="button">프리즘 영향</button>
          <button id="btnOff" class="pill-btn off active" type="button">프리즘 없음</button>
        </div>
      </div>

      <div class="message">
        <div id="messageCopy" class="message-copy">
          단안 난시 소비자의 경우, 프리즘의 영향이 없이
          <span class="blue">저녁까지 편안함과 선명함 제공</span>
        </div>
        <button class="confirm-btn" type="button" onclick="closeDemo()">확인</button>
      </div>
    </div>
  </div>

  <script>
    const scene = document.getElementById('scene');
    const targetStage = document.getElementById('targetStage');
    const btnOn = document.getElementById('btnOn');
    const btnOff = document.getElementById('btnOff');
    const messageCopy = document.getElementById('messageCopy');

    function setMode(mode){
      const isOn = mode === 'on';

      scene.classList.toggle('mode-on', isOn);
      scene.classList.toggle('mode-off', !isOn);

      targetStage.classList.toggle('is-on', isOn);
      targetStage.classList.toggle('is-off', !isOn);

      btnOn.classList.toggle('active', isOn);
      btnOff.classList.toggle('active', !isOn);

      if(isOn){
        messageCopy.innerHTML = `
          단안 난시 소비자의 경우, 프리즘의 영향으로
          <span class="blue">양안의 이미지 위치에 차이가 발생하여 오후 피로감 발생 가능</span>
        `;
      }else{
        messageCopy.innerHTML = `
          단안 난시 소비자의 경우, 프리즘의 영향이 없이
          <span class="blue">저녁까지 편안함과 선명함 제공</span>
        `;
      }
    }

    btnOn.addEventListener('click', () => setMode('on'));
    btnOff.addEventListener('click', () => setMode('off'));

    function closeDemo(){
      // 실제 통합할 때는 팝업 hide 로직으로 바꾸면 됨
      alert('여기에 닫기 로직 연결');
    }

    // 기본 상태
    setMode('off');
  </script>
</body>
</html>
