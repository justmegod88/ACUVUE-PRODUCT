<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>ASD™ 편안한 시야</title>

  <style>
    :root{
      --acuvue-blue:#005EB8;
      --acuvue-blue-2:#1E78D6;
      --panel-bg:#dfe8f3;
      --panel-border:#c7d4e6;
      --text:#0c1f35;
      --shadow:0 18px 44px rgba(10,30,55,.20);
      --blue-soft:#176fd6;
      --red-soft:#d71919;
      --pill-border:#0e3f62;
      --pill-bg:#ffffff;
      --pill-active:#0d68cf;
    }

    *{ box-sizing:border-box; }
    html,body{
      margin:0;
      height:100%;
      background:#000;
      font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",sans-serif;
      color:var(--text);
      overflow:hidden;
    }

    .wrap{
      min-height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:12px;
    }

    .modal{
      width:min(820px, 96vw);
      border-radius:24px;
      overflow:hidden;
      background:#fff;
      border:1px solid rgba(255,255,255,.18);
      box-shadow:var(--shadow);
    }

    .modal-head{
      height:76px;
      background:#dbe5f1;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 26px;
      border-bottom:1px solid rgba(10,30,55,.08);
    }
    .modal-title{
      font-size:28px;
      font-weight:900;
      color:#000;
      letter-spacing:-.5px;
    }
    .modal-close{
      border:none;
      background:transparent;
      font-size:34px;
      line-height:1;
      color:#000;
      cursor:pointer;
      padding:0;
      width:44px;
      height:44px;
    }

    .scene{
      position:relative;
      height:min(64vw, 540px);
      min-height:420px;
      background:#efefef url('face.png') center center / cover no-repeat;
      overflow:hidden;
    }

    .scene::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(110px 140px at 38% 46%, rgba(255,255,255,.28), rgba(255,255,255,0) 60%),
        radial-gradient(110px 140px at 62% 46%, rgba(255,255,255,.28), rgba(255,255,255,0) 60%);
      pointer-events:none;
      z-index:0;
    }

    /* 시표 영역 */
    .target-stage{
      position:absolute;
      left:50%;
      top:49%;
      width:150px;
      height:220px;
      transform:translate(-50%,-50%);
      z-index:3;
      pointer-events:none;
    }

    .target-bg{
      position:absolute;
      inset:0;
      border-radius:18px;
      background:rgba(255,220,235,.42);
      border:2px solid rgba(255,255,255,.64);
      backdrop-filter: blur(1px);
      box-shadow:0 8px 24px rgba(0,0,0,.08);
      transition:opacity .35s ease, transform .45s ease;
    }

    .target-a{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      font-size:126px;
      line-height:1;
      font-weight:300;
      letter-spacing:-8px;
      font-family:Georgia, "Times New Roman", serif;
      user-select:none;
      transition:
        top .55s cubic-bezier(.22,.8,.22,1),
        opacity .35s ease,
        color .35s ease,
        transform .55s cubic-bezier(.22,.8,.22,1);
    }

    .a-red{
      color:var(--red-soft);
      z-index:2;
    }
    .a-blue{
      color:var(--blue-soft);
      z-index:1;
    }

    /* OFF = 거의 하나처럼 겹침 */
    .scene.mode-off .a-red{
      top:50%;
      opacity:.78;
      transform:translate(-50%,-50%);
      animation:none;
    }
    .scene.mode-off .a-blue{
      top:50%;
      opacity:.82;
      transform:translate(-50%,-50%);
    }
    .scene.mode-off .target-bg{
      opacity:.42;
      transform:none;
    }

    /* ON = 빨간 A가 더 위로, 살짝 흔들림 */
    .scene.mode-on .a-red{
      top:34%;
      opacity:1;
      transform:translate(-50%,-50%);
      animation:redFloat 1.5s ease-in-out infinite;
    }
    .scene.mode-on .a-blue{
      top:64%;
      opacity:1;
      transform:translate(-50%,-50%);
    }
    .scene.mode-on .target-bg{
      opacity:.58;
      transform:translateY(-2px);
    }

    @keyframes redFloat{
      0%   { transform:translate(-50%,-50%) translateY(0); }
      25%  { transform:translate(-50%,-50%) translateY(-4px); }
      50%  { transform:translate(-50%,-50%) translateY(1px); }
      75%  { transform:translate(-50%,-50%) translateY(-3px); }
      100% { transform:translate(-50%,-50%) translateY(0); }
    }

    /* 점선 시선 */
    .guide-line{
      position:absolute;
      height:0;
      border-top:7px dashed;
      width:100px;
      opacity:.96;
      z-index:5;
      transform-origin:left center;
      transition:all .45s ease;
      pointer-events:none;
    }

    /* 소비자 우측 = 화면 왼쪽 눈 */
    .guide-line.red{
      left:36%;
      top:48.5%;
      border-color:var(--red-soft);
    }
    .guide-line.blue{
      left:60.5%;
      top:48.5%;
      border-color:var(--blue-soft);
    }

    .scene.mode-off .guide-line.red{
      transform:translate(-6px, 0) rotate(28deg);
      width:86px;
    }
    .scene.mode-off .guide-line.blue{
      transform:translate(-2px, 0) rotate(138deg);
      width:74px;
    }

    .scene.mode-on .guide-line.red{
      transform:translate(-10px, -8px) rotate(28deg);
      width:120px;
    }
    .scene.mode-on .guide-line.blue{
      transform:translate(-6px, 4px) rotate(132deg);
      width:118px;
    }

    /* 광학 요소 : 소비자 우측 눈 앞(화면 왼쪽) */
    .optic{
      position:absolute;
      left:36.5%;
      top:47.5%;
      width:64px;
      height:126px;
      transform:translate(-50%,-50%);
      z-index:4;
      transition:all .45s ease;
      pointer-events:none;
    }

    .optic-prism,
    .optic-flat{
      position:absolute;
      inset:0;
      display:none;
    }

    .scene.mode-on .optic{
      left:36.2%;
      top:46.8%;
    }
    .scene.mode-off .optic{
      left:35.8%;
      top:47.4%;
    }

    .scene.mode-on .optic-prism{ display:block; }
    .scene.mode-off .optic-flat{ display:block; }

    /* 프리즘 */
    .optic-prism::before{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      width:0;
      height:0;
      border-left:34px solid transparent;
      border-right:34px solid transparent;
      border-bottom:112px solid rgba(255,255,255,.46);
      filter:drop-shadow(0 4px 10px rgba(0,0,0,.10));
    }
    .optic-prism::after{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-46%);
      width:0;
      height:0;
      border-left:28px solid transparent;
      border-right:28px solid transparent;
      border-bottom:94px solid rgba(214,238,255,.32);
    }

    /* 플랫 바 */
    .optic-flat::before{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      width:48px;
      height:118px;
      border-radius:6px;
      background:linear-gradient(180deg, rgba(255,255,255,.60), rgba(226,236,246,.44));
      border:1px solid rgba(255,255,255,.70);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.28),
        0 4px 10px rgba(0,0,0,.08);
    }

    /* 버튼 */
    .prism-pill{
      position:absolute;
      left:50%;
      bottom:16px;
      transform:translateX(-50%);
      width:min(94%, 760px);
      height:88px;
      border-radius:999px;
      display:flex;
      align-items:center;
      padding:8px;
      gap:8px;
      z-index:6;
      background:var(--pill-bg);
      border:4px solid var(--pill-border);
      box-shadow:0 10px 20px rgba(0,0,0,.12);
    }

    .pill-label{
      flex:0 0 1.05fr;
      min-width:108px;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:28px;
      font-weight:900;
      color:#111;
      letter-spacing:-.4px;
      border-radius:999px;
      background:transparent;
      text-align:center;
      padding:0 12px;
      user-select:none;
    }

    .pill-btn{
      flex:1 1 0;
      height:100%;
      border-radius:999px;
      border:4px solid var(--pill-border);
      background:#f8fbff;
      color:#111;
      font-size:28px;
      font-weight:900;
      letter-spacing:-.4px;
      cursor:pointer;
      transition:all .22s ease;
      box-shadow:inset 0 -2px 0 rgba(0,0,0,.04);
    }

    .pill-btn.active{
      background:linear-gradient(180deg, #1674dc 0%, #0e67ca 100%);
      color:#fff;
      border-color:#0b4a93;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.20),
        0 8px 14px rgba(0,94,184,.16);
    }

    /* 하단 메시지 */
    .message{
      background:#dbe5f1;
      padding:28px 34px 30px;
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:20px;
      border-top:1px solid rgba(10,30,55,.08);
    }

    .message-copy{
      flex:1 1 auto;
      font-size:28px;
      line-height:1.34;
      font-weight:900;
      letter-spacing:-.6px;
      color:#000;
      word-break:keep-all;
    }
    .message-copy .blue{
      color:var(--acuvue-blue);
    }

    .confirm-btn{
      flex:0 0 auto;
      min-width:120px;
      height:86px;
      padding:0 26px;
      border:none;
      border-radius:18px;
      background:#1168d0;
      color:#fff;
      font-size:24px;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 10px 22px rgba(17,104,208,.22);
    }

    @media (max-width: 820px){
      .modal-title{ font-size:20px; }
      .scene{ height:520px; min-height:360px; }
      .target-stage{
        width:126px;
        height:188px;
      }
      .target-a{ font-size:108px; }
      .guide-line{ border-top-width:6px; }
      .optic{
        width:54px;
        height:106px;
      }
      .optic-prism::before{
        border-left-width:29px;
        border-right-width:29px;
        border-bottom-width:94px;
      }
      .optic-prism::after{
        border-left-width:24px;
        border-right-width:24px;
        border-bottom-width:78px;
      }
      .optic-flat::before{
        width:40px;
        height:100px;
      }
      .prism-pill{
        height:78px;
      }
      .pill-label,
      .pill-btn{
        font-size:22px;
      }
      .message{
        padding:22px 18px 22px;
        gap:14px;
      }
      .message-copy{
        font-size:22px;
      }
      .confirm-btn{
        min-width:98px;
        height:74px;
        font-size:20px;
        border-radius:16px;
      }
    }

    @media (max-width: 560px){
      .wrap{ padding:8px; }
      .modal{ width:100%; border-radius:20px; }
      .modal-head{
        height:60px;
        padding:0 18px;
      }
      .modal-title{ font-size:18px; }
      .modal-close{ font-size:26px; width:34px; height:34px; }

      .scene{
        height:320px;
        min-height:320px;
      }

      .target-stage{
        width:84px;
        height:132px;
        top:49%;
      }
      .target-a{
        font-size:74px;
        letter-spacing:-4px;
      }

      .guide-line{
        border-top-width:5px;
      }

      .scene.mode-off .guide-line.red{
        width:58px;
        transform:translate(-3px, 1px) rotate(30deg);
      }
      .scene.mode-off .guide-line.blue{
        width:52px;
        transform:translate(-1px, 0) rotate(136deg);
      }

      .scene.mode-on .guide-line.red{
        width:82px;
        transform:translate(-5px, -5px) rotate(31deg);
      }
      .scene.mode-on .guide-line.blue{
        width:78px;
        transform:translate(-2px, 3px) rotate(132deg);
      }

      .optic{
        width:42px;
        height:82px;
        left:36%;
      }
      .optic-prism::before{
        border-left-width:22px;
        border-right-width:22px;
        border-bottom-width:70px;
      }
      .optic-prism::after{
        border-left-width:18px;
        border-right-width:18px;
        border-bottom-width:58px;
      }
      .optic-flat::before{
        width:28px;
        height:78px;
      }

      .prism-pill{
        width:min(94%, 520px);
        height:66px;
        bottom:10px;
        border-width:3px;
        gap:6px;
        padding:6px;
      }
      .pill-label{
        min-width:74px;
        font-size:15px;
        padding:0 8px;
      }
      .pill-btn{
        font-size:15px;
        border-width:3px;
        padding:0 8px;
      }

      .message{
        padding:18px 14px 18px;
        gap:12px;
      }
      .message-copy{
        font-size:17px;
        line-height:1.38;
      }
      .confirm-btn{
        min-width:82px;
        height:58px;
        font-size:16px;
        border-radius:14px;
        padding:0 18px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="modal">
      <div class="modal-head">
        <div class="modal-title">ASD™ 편안한 시야</div>
        <button class="modal-close" type="button" onclick="closeDemo()">X</button>
      </div>

      <div id="scene" class="scene mode-off">
        <div id="targetStage" class="target-stage is-off">
          <div class="target-bg"></div>
          <div class="target-a a-red">A</div>
          <div class="target-a a-blue">A</div>
        </div>

        <div class="optic">
          <div class="optic-prism"></div>
          <div class="optic-flat"></div>
        </div>

        <div class="guide-line red"></div>
        <div class="guide-line blue"></div>

        <div class="prism-pill">
          <div class="pill-label">단안</div>
          <button id="btnOn" class="pill-btn" type="button">프리즘 유</button>
          <button id="btnOff" class="pill-btn active" type="button">프리즘 무</button>
        </div>
      </div>

      <div class="message">
        <div id="messageCopy" class="message-copy">
          프리즘이 단안 난시 소비자에게 미치는 영향을
          <span class="blue">‘프리즘 유/무 버튼’</span>을 통해 확인해 보세요
        </div>
        <button id="confirmBtn" class="confirm-btn" type="button" onclick="closeDemo()">확인</button>
      </div>
    </div>
  </div>

  <script>
    const scene = document.getElementById('scene');
    const targetStage = document.getElementById('targetStage');
    const btnOn = document.getElementById('btnOn');
    const btnOff = document.getElementById('btnOff');
    const messageCopy = document.getElementById('messageCopy');

    function setMode(mode){
      const isOn = mode === 'on';

      scene.classList.toggle('mode-on', isOn);
      scene.classList.toggle('mode-off', !isOn);

      targetStage.classList.toggle('is-on', isOn);
      targetStage.classList.toggle('is-off', !isOn);

      btnOn.classList.toggle('active', isOn);
      btnOff.classList.toggle('active', !isOn);

      if(isOn){
        messageCopy.innerHTML = `
          단안 난시 소비자의 경우, 프리즘의 영향으로
          <span class="blue">양안의 이미지 위치에 차이가 발생하여 오후 피로감 발생 가능</span>
        `;
      }else{
        messageCopy.innerHTML = `
          단안 난시 소비자의 경우, 프리즘의 영향이 없이
          <span class="blue">저녁까지 편안함과 선명함 제공</span>
        `;
      }
    }

    btnOn.addEventListener('click', () => setMode('on'));
    btnOff.addEventListener('click', () => setMode('off'));

    function closeDemo(){
      alert('여기에 닫기 로직 연결');
    }

    setMode('off');
  </script>
</body>
</html>
