<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>ASD™ 편안한 시야</title>

  <style>
    :root{
      --acuvue-blue:#005EB8;
      --acuvue-blue-deep:#0a3e63;
      --panel:#dfe8f4;
      --header:#e8eef7;
      --border:#c9d5e6;
      --text:#111827;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      height:100%;
      background:#000;
      font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    }

    .wrap{
      min-height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
    }

    .card{
      width:min(860px, 96vw);
      border-radius:22px;
      overflow:hidden;
      background:#fff;
      border:1px solid var(--border);
      box-shadow:0 24px 70px rgba(0,0,0,.28);
    }

    .card-header{
      height:76px;
      background:var(--header);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 26px;
      border-bottom:1px solid rgba(0,0,0,.06);
    }

    .card-title{
      font-size:27px;
      font-weight:900;
      color:#000;
      letter-spacing:-.4px;
    }

    .close-btn{
      border:none;
      background:transparent;
      font-size:28px;
      line-height:1;
      cursor:pointer;
      color:#000;
      padding:0;
    }

    .stage{
      position:relative;
      width:100%;
      aspect-ratio: 1.72 / 1;
      min-height:340px;
      overflow:hidden;
      background:#ddd;
    }

    .face-img{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    /* 프리즘 / 플랫 바 */
    .optic{
      position:absolute;
      left:50%;
      top:52%;
      transform:translate(-50%,-50%);
      width:94px;
      height:210px;
      z-index:3;
      pointer-events:none;
      transition:opacity .35s ease, transform .45s ease;
    }

    .optic-flat,
    .optic-prism{
      position:absolute;
      inset:0;
      transition:opacity .35s ease, transform .45s ease;
    }

    .optic-flat{
      border-radius:10px;
      background:linear-gradient(
        180deg,
        rgba(255,235,246,.78) 0%,
        rgba(247,227,244,.72) 48%,
        rgba(255,213,229,.82) 100%
      );
      border:1px solid rgba(255,255,255,.7);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.28),
        0 10px 20px rgba(0,0,0,.05);
      opacity:1;
    }

    .optic-flat::before{
      content:"A";
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:118px;
      font-weight:300;
      color:rgba(216,189,166,.92);
      text-shadow:0 1px 0 rgba(255,255,255,.22);
    }

    .optic-prism{
      opacity:0;
      transform:translateY(0);
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .optic-prism::before{
      content:"";
      width:0;
      height:0;
      border-left:46px solid transparent;
      border-right:46px solid transparent;
      border-bottom:190px solid rgba(143,212,255,.82);
      filter:drop-shadow(0 10px 18px rgba(0,0,0,.08));
    }

    .optic-prism::after{
      content:"A";
      position:absolute;
      left:50%;
      top:58%;
      transform:translate(-50%,-50%);
      font-size:108px;
      font-weight:300;
      color:rgba(216,189,166,.88);
      text-shadow:0 1px 0 rgba(255,255,255,.18);
    }

    /* 시표: 상하 분리 */
    .target-stage{
      position:absolute;
      left:50%;
      top:52%;
      transform:translate(-50%,-50%);
      width:112px;
      height:184px;
      z-index:4;
      pointer-events:none;
    }

    .target-a{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      font-size:118px;
      line-height:1;
      font-weight:300;
      color:rgba(216,189,166,.96);
      text-shadow:0 1px 0 rgba(255,255,255,.25);
      transition:
        transform .55s cubic-bezier(.22,.61,.36,1),
        opacity .35s ease,
        filter .35s ease;
    }

    /* 기본: 하나처럼 */
    .target-stage.is-off .target-top{
      transform:translate(-50%,-50%) translateY(0);
      opacity:.98;
      filter:none;
    }
    .target-stage.is-off .target-bottom{
      transform:translate(-50%,-50%) translateY(0);
      opacity:.98;
      filter:none;
    }

    /* 프리즘 영향: 프리즘이 들어간 쪽 상이 위로 올라감 */
    .target-stage.is-on .target-top{
      transform:translate(-50%,-50%) translateY(-20px);
      opacity:.88;
      filter:blur(.15px);
    }
    .target-stage.is-on .target-bottom{
      transform:translate(-50%,-50%) translateY(10px);
      opacity:.78;
      filter:blur(.1px);
    }

    /* 시선 점선 */
    .guide-line{
      position:absolute;
      height:0;
      border-top:3px dotted;
      opacity:.8;
      z-index:2;
      transition:transform .55s cubic-bezier(.22,.61,.36,1), opacity .35s ease;
      transform-origin:left center;
      pointer-events:none;
    }

    .guide-line.left{
      width:110px;
      left:38.5%;
      top:52%;
      border-color:#e45b5b;
      transform:rotate(8deg);
    }
    .guide-line.right{
      width:110px;
      left:50.4%;
      top:52%;
      border-color:#4f8cff;
      transform:rotate(-8deg);
    }

    .target-stage.is-on ~ .guide-line.left{
      transform:rotate(12deg) translateY(-8px);
    }
    .target-stage.is-on ~ .guide-line.right{
      transform:rotate(-12deg) translateY(-8px);
    }

    /* 토글 */
    .toggle-wrap{
      position:absolute;
      right:24px;
      bottom:20px;
      z-index:5;
      display:flex;
      align-items:center;
      background:#136a99;
      border:4px solid #083651;
      border-radius:999px;
      padding:0;
      overflow:hidden;
      box-shadow:0 8px 18px rgba(0,0,0,.14);
    }

    .toggle-label{
      color:#fff;
      font-size:24px;
      font-weight:500;
      padding:0 34px;
      white-space:nowrap;
      letter-spacing:-.3px;
    }

    .toggle-btn{
      min-width:122px;
      height:96px;
      border:none;
      border-left:4px solid #083651;
      background:#1f739f;
      color:#e9f5ff;
      font-size:26px;
      font-weight:500;
      cursor:pointer;
      transition:background .2s ease, color .2s ease, opacity .2s ease;
    }

    .toggle-btn.active{
      background:#2e86b8;
      color:#fff;
    }

    /* 하단 메시지 */
    .message-box{
      background:#dfe8f4;
      padding:30px 34px 26px;
      position:relative;
    }

    .message-text{
      margin:0;
      font-size:32px;
      line-height:1.33;
      font-weight:900;
      color:#000;
      letter-spacing:-.6px;
      padding-right:150px;
      word-break:keep-all;
    }

    .message-text .blue{
      color:#166bca;
    }

    .confirm-btn{
      position:absolute;
      right:28px;
      bottom:24px;
      width:118px;
      height:74px;
      border:none;
      border-radius:16px;
      background:#1169cf;
      color:#fff;
      font-size:24px;
      font-weight:800;
      cursor:pointer;
      box-shadow:0 10px 22px rgba(17,105,207,.22);
    }

    @media (max-width: 768px){
      .card-header{ height:64px; padding:0 18px; }
      .card-title{ font-size:22px; }
      .stage{ min-height:260px; }
      .optic{
        width:70px;
        height:154px;
      }
      .optic-flat::before{ font-size:84px; }
      .optic-prism::before{
        border-left-width:34px;
        border-right-width:34px;
        border-bottom-width:140px;
      }
      .optic-prism::after{
        font-size:78px;
      }
      .target-stage{
        width:84px;
        height:136px;
      }
      .target-a{
        font-size:86px;
      }
      .target-stage.is-on .target-top{
        transform:translate(-50%,-50%) translateY(-15px);
      }
      .target-stage.is-on .target-bottom{
        transform:translate(-50%,-50%) translateY(8px);
      }
      .guide-line.left{
        width:78px;
        left:37.2%;
        top:52.4%;
      }
      .guide-line.right{
        width:78px;
        left:51%;
        top:52.4%;
      }
      .toggle-wrap{
        right:16px;
        bottom:14px;
        transform:scale(.84);
        transform-origin:right bottom;
      }
      .message-box{
        padding:22px 22px 22px;
      }
      .message-text{
        font-size:22px;
        padding-right:108px;
      }
      .confirm-btn{
        width:92px;
        height:58px;
        font-size:18px;
        right:18px;
        bottom:18px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="card-header">
        <div class="card-title">ASD™ 편안한 시야</div>
        <button class="close-btn" type="button">X</button>
      </div>

      <div class="stage">
        <!-- 얼굴 이미지는 폴더에 넣은 파일명으로 바꿔도 됨 -->
        <img class="face-img" src="face.png" alt="눈 이미지" onerror="this.style.display='none'; this.parentElement.style.background='#e5e7eb';">

        <div class="optic" id="optic">
          <div class="optic-flat" id="opticFlat"></div>
          <div class="optic-prism" id="opticPrism"></div>
        </div>

        <div class="target-stage is-off" id="targetStage">
          <div class="target-a target-top">A</div>
          <div class="target-a target-bottom">A</div>
        </div>

        <div class="guide-line left" id="leftLine"></div>
        <div class="guide-line right" id="rightLine"></div>

        <div class="toggle-wrap">
          <div class="toggle-label">단안 프리즘</div>
          <button class="toggle-btn" id="btnPrismOn" type="button">프리즘 영향</button>
          <button class="toggle-btn active" id="btnPrismOff" type="button">프리즘 없음</button>
        </div>
      </div>

      <div class="message-box">
        <p class="message-text" id="messageText">
          단안 난시 소비자의 경우, 프리즘의 영향이 없이
          <span class="blue">저녁까지 편안함과 선명함 제공</span>
        </p>
        <button class="confirm-btn" type="button">확인</button>
      </div>
    </div>
  </div>

  <script>
    const targetStage = document.getElementById('targetStage');
    const opticFlat = document.getElementById('opticFlat');
    const opticPrism = document.getElementById('opticPrism');
    const btnPrismOn = document.getElementById('btnPrismOn');
    const btnPrismOff = document.getElementById('btnPrismOff');
    const messageText = document.getElementById('messageText');

    function setPrismState(state){
      const isOn = state === 'on';

      targetStage.classList.remove('is-on', 'is-off');
      targetStage.classList.add(isOn ? 'is-on' : 'is-off');

      btnPrismOn.classList.toggle('active', isOn);
      btnPrismOff.classList.toggle('active', !isOn);

      opticPrism.style.opacity = isOn ? '1' : '0';
      opticPrism.style.transform = isOn ? 'translateY(0)' : 'translateY(0)';
      opticFlat.style.opacity = isOn ? '0' : '1';

      if(isOn){
        messageText.innerHTML =
          '단안 난시 소비자의 경우, 프리즘의 영향으로 <span class="blue">상의 위치에 차이가 발생하여 오후 피로감 발생 가능</span>';
      }else{
        messageText.innerHTML =
          '단안 난시 소비자의 경우, 프리즘의 영향이 없이 <span class="blue">저녁까지 편안함과 선명함 제공</span>';
      }
    }

    btnPrismOn.addEventListener('click', ()=> setPrismState('on'));
    btnPrismOff.addEventListener('click', ()=> setPrismState('off'));

    setPrismState('off');
  </script>
</body>
</html>
