<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>ACUVUE GLB Viewer</title>

<style>
html,body{
height:100%;
margin:0;
background:#f5f9ff;
overflow:hidden;
font-family:-apple-system,system-ui;
}

/* tutorial layer */
#tutorialLayer{
position:fixed;
inset:0;
z-index:95;
display:none;
background:rgba(0,0,0,.55);
}
#tutorialLayer.show{display:block}

/* highlight holes */
.highlight{
position:absolute;
pointer-events:none;
box-shadow:0 0 0 2000px rgba(0,0,0,.55);
border-radius:18px;
}

/* center lens */
#hlCenter{
width:300px;
height:300px;
left:50%;
top:50%;
transform:translate(-50%,-50%);
border-radius:50%;
display:none;
}

/* bottom buttons */
#hlBottom{
left:0;
right:0;
bottom:0;
height:140px;
border-radius:0;
display:none;
}

/* top cards */
#hlTop{
left:0;
right:0;
top:0;
height:120px;
border-radius:0;
display:none;
}

/* popup design */
.tutBox{
position:absolute;
width:min(320px,84vw);
background:#ffffff;
color:#0b1f33;
border-radius:18px;
padding:16px;
box-shadow:0 20px 60px rgba(0,0,0,.25);
}

.tutTitle{
font-weight:900;
font-size:18px;
margin-bottom:8px;
}

.tutText{
font-size:14px;
line-height:1.4;
opacity:.9;
}

.tutBtn{
margin-top:14px;
width:100%;
height:44px;
border-radius:14px;
border:none;
background:#005EB8;
color:#fff;
font-weight:900;
font-size:15px;
cursor:pointer;
}

#tutLeft{left:20px;top:50%;transform:translateY(-50%)}
#tutBottom{left:50%;bottom:160px;transform:translateX(-50%)}
#tutTop{left:50%;top:140px;transform:translateX(-50%)}

/* key message */

#asdKeyMsgLayer{
position:fixed;
inset:0;
z-index:96;
display:none;
background:rgba(0,0,0,.55);
}
#asdKeyMsgLayer.show{display:block}

#asdKeyMsgCard{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
width:min(340px,84vw);
background:#fff;
border-radius:22px;
padding:20px;
box-shadow:0 20px 60px rgba(0,0,0,.25);
}

.kmTitle{
font-weight:900;
font-size:20px;
margin-bottom:10px;
}

.kmText{
font-size:15px;
line-height:1.45;
}

.kmBtn{
margin-top:16px;
width:100%;
height:46px;
border-radius:14px;
border:none;
background:#005EB8;
color:#fff;
font-weight:900;
font-size:16px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="tutorialLayer">

<div id="hlCenter" class="highlight"></div>
<div id="hlBottom" class="highlight"></div>
<div id="hlTop" class="highlight"></div>

<div class="tutBox" id="tutLeft" style="display:none;">
<div class="tutTitle">가이드 1</div>
<div class="tutText">렌즈를 드래그 및 확대, 축소해 보세요.<br/>아큐브 난시 렌즈 구조를 확인할 수 있습니다.</div>
<button class="tutBtn" id="tutNext1">확인</button>
</div>

<div class="tutBox" id="tutBottom" style="display:none;">
<div class="tutTitle">가이드 2</div>
<div class="tutText">‘렌즈 두께 MAP’을 클릭하여<br/>렌즈의 가장 얇은 부분을 확인해 보세요!</div>
<button class="tutBtn" id="tutNext2">확인</button>
</div>

<div class="tutBox" id="tutTop" style="display:none;">
<div class="tutTitle">가이드 3</div>
<div class="tutText">각 카드를 눌러 미션을 진행해 보세요.<br/>미션 완료시 기프티콘!</div>
<button class="tutBtn" id="tutDone">확인</button>
</div>

</div>

<div id="asdKeyMsgLayer">
<div id="asdKeyMsgCard">
<div class="kmTitle">키 메시지</div>
<div class="kmText">아큐브 ASD는 자연스러운 눈 깜박임을 통해<br/>빠르고 정확하게 축 안정화를 합니다.</div>
<button class="kmBtn" id="asdKeyConfirm">확인</button>
</div>
</div>

<script>

const tutorialLayer=document.getElementById("tutorialLayer")

const tutLeft=document.getElementById("tutLeft")
const tutBottom=document.getElementById("tutBottom")
const tutTop=document.getElementById("tutTop")

const hlCenter=document.getElementById("hlCenter")
const hlBottom=document.getElementById("hlBottom")
const hlTop=document.getElementById("hlTop")

function showTut(step){

tutorialLayer.classList.add("show")

tutLeft.style.display="none"
tutBottom.style.display="none"
tutTop.style.display="none"

hlCenter.style.display="none"
hlBottom.style.display="none"
hlTop.style.display="none"

if(step===1){
tutLeft.style.display="block"
hlCenter.style.display="block"
}

if(step===2){
tutBottom.style.display="block"
hlBottom.style.display="block"
}

if(step===3){
tutTop.style.display="block"
hlTop.style.display="block"
}

}

function hideTut(){
tutorialLayer.classList.remove("show")
}

document.getElementById("tutNext1").onclick=()=>showTut(2)
document.getElementById("tutNext2").onclick=()=>showTut(3)
document.getElementById("tutDone").onclick=()=>hideTut()

window.addEventListener("load",()=>{
showTut(1)
})

const keyLayer=document.getElementById("asdKeyMsgLayer")

document.getElementById("asdKeyConfirm").onclick=()=>{
keyLayer.classList.remove("show")
}

</script>

</body>
</html>
