<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>ASD™ 편안한 시야</title>

  <style>
    :root{
      --acuvue-blue:#005EB8;
      --text:#0c1f35;
      --shadow:0 18px 44px rgba(10,30,55,.20);
      --blue-soft:#176fd6;
      --red-soft:#e02020;
      --pill-border:#0d4c78;
      --pill-active1:#2b86ea;
      --pill-active2:#116bd3;
      --pill-text:#0d2138;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      height:100%;
      background:#000;
      font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",sans-serif;
      color:var(--text);
      overflow:hidden;
    }

    .wrap{
      min-height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:12px;
    }

    .modal{
      width:min(820px, 96vw);
      border-radius:24px;
      overflow:hidden;
      background:#fff;
      border:1px solid rgba(255,255,255,.18);
      box-shadow:var(--shadow);
    }

    .modal-head{
      height:76px;
      background:#dbe5f1;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 26px;
      border-bottom:1px solid rgba(10,30,55,.08);
    }

    .modal-title{
      font-size:28px;
      font-weight:900;
      color:#000;
      letter-spacing:-.5px;
    }

    .modal-close{
      border:none;
      background:transparent;
      font-size:34px;
      line-height:1;
      color:#000;
      cursor:pointer;
      padding:0;
      width:44px;
      height:44px;
    }

    .scene{
      position:relative;
      height:min(64vw, 540px);
      min-height:420px;
      background:#efefef url('face_V2.png') center center / cover no-repeat;
      overflow:hidden;
    }

    .scene::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(120px 150px at 30% 46%, rgba(255,255,255,.18), rgba(255,255,255,0) 62%),
        radial-gradient(120px 150px at 69% 46%, rgba(255,255,255,.14), rgba(255,255,255,0) 62%);
      pointer-events:none;
      z-index:0;
    }

    /* ===== 시표 카드 ===== */
    .target-stage{
      position:absolute;
      width:118px;
      height:176px;
      transform:translate(-50%,-50%);
      z-index:4;
      pointer-events:none;
      transition:left .35s ease, top .35s ease, width .35s ease, height .35s ease;
    }

    .target-box{
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      width:100%;
      height:100%;
      border-radius:18px;
      border:2px solid rgba(255,255,255,.58);
      backdrop-filter: blur(1px);
      box-shadow:0 8px 24px rgba(0,0,0,.08);
      transition:
        top .45s ease,
        opacity .35s ease,
        background .35s ease,
        transform .45s ease;
    }

    .target-box.box-top{
      z-index:0;
      background:rgba(251,221,231,.38);
    }
    .target-box.box-bottom{
      z-index:0;
      background:rgba(245,222,232,.16);
    }

    .target-a{
      position:absolute;
      left:50%;
      transform:translate(-50%,-50%);
      font-size:104px;
      line-height:1;
      font-weight:300;
      letter-spacing:-6px;
      font-family:Georgia, "Times New Roman", serif;
      user-select:none;
      transition:
        top .55s cubic-bezier(.22,.8,.22,1),
        opacity .35s ease,
        transform .55s cubic-bezier(.22,.8,.22,1),
        color .35s ease;
      z-index:2;
    }

    .a-red{ color:var(--red-soft); }
    .a-blue{ color:var(--blue-soft); }

    .scene.mode-default .box-top,
    .scene.mode-default .box-bottom{
      top:0;
      opacity:.92;
      transform:translateX(-50%);
    }
    .scene.mode-default .box-top{
      background:rgba(245,222,232,.24);
    }
    .scene.mode-default .box-bottom{
      background:rgba(245,222,232,.14);
    }
    .scene.mode-default .a-red{
      top:50%;
      opacity:.16;
      transform:translate(-50%,-50%);
      animation:none;
      color:#b44dc9;
    }
    .scene.mode-default .a-blue{
      top:50%;
      opacity:.88;
      transform:translate(-50%,-50%);
      animation:none;
      color:#8b2da0;
    }

    .scene.mode-off .box-top,
    .scene.mode-off .box-bottom{
      top:0;
      opacity:.92;
      transform:translateX(-50%);
    }
    .scene.mode-off .box-top{
      background:rgba(245,222,232,.28);
    }
    .scene.mode-off .box-bottom{
      background:rgba(245,222,232,.16);
    }
    .scene.mode-off .a-red{
      top:50%;
      opacity:.30;
      transform:translate(-50%,-50%);
      animation:none;
      color:#b44dc9;
    }
    .scene.mode-off .a-blue{
      top:50%;
      opacity:.92;
      transform:translate(-50%,-50%);
      color:#8b2da0;
      animation:none;
    }

    .scene.mode-on .box-top{
      top:-14px;
      opacity:.96;
      background:rgba(251,221,231,.42);
      animation:pinkFloat 1.45s ease-in-out infinite;
    }
    .scene.mode-on .box-bottom{
      top:14px;
      opacity:.82;
      background:rgba(219,234,255,.28);
      transform:translateX(-50%);
    }
    .scene.mode-on .a-red{
      top:33%;
      opacity:1;
      transform:translate(-50%,-50%);
      color:var(--red-soft);
      animation:redFloat 1.45s ease-in-out infinite;
    }
    .scene.mode-on .a-blue{
      top:69%;
      opacity:1;
      transform:translate(-50%,-50%);
      color:var(--blue-soft);
    }

    @keyframes redFloat{
      0%   { transform:translate(-50%,-50%) translateY(0); }
      25%  { transform:translate(-50%,-50%) translateY(-4px); }
      50%  { transform:translate(-50%,-50%) translateY(1px); }
      75%  { transform:translate(-50%,-50%) translateY(-3px); }
      100% { transform:translate(-50%,-50%) translateY(0); }
    }

    @keyframes pinkFloat{
      0%   { transform:translateX(-50%) translateY(0); }
      25%  { transform:translateX(-50%) translateY(-4px); }
      50%  { transform:translateX(-50%) translateY(1px); }
      75%  { transform:translateX(-50%) translateY(-3px); }
      100% { transform:translateX(-50%) translateY(0); }
    }

    /* ===== 광학 요소 ===== */
    .optic{
      position:absolute;
      width:58px;
      height:118px;
      transform:translate(-50%,-50%);
      z-index:7;
      transition:left .35s ease, top .35s ease, width .35s ease, height .35s ease;
      pointer-events:none;
    }

    .scene.mode-on .optic-prism{ display:block; }
    .scene.mode-on .optic-flat{ display:none; }

    .scene.mode-off .optic-prism{ display:none; }
    .scene.mode-off .optic-flat{ display:block; }

    .scene.mode-default .optic-prism,
    .scene.mode-default .optic-flat{
      display:none;
    }

    .optic-prism,
    .optic-flat{
      position:absolute;
      inset:0;
    }

    .optic-prism::before{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      width:0;
      height:0;
      border-left:30px solid transparent;
      border-right:30px solid transparent;
      border-bottom:100px solid rgba(255,255,255,.46);
      filter:drop-shadow(0 4px 10px rgba(0,0,0,.10));
    }

    .optic-prism::after{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-46%);
      width:0;
      height:0;
      border-left:24px solid transparent;
      border-right:24px solid transparent;
      border-bottom:82px solid rgba(214,238,255,.30);
    }

    .optic-flat::before{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      width:34px;
      height:92px;
      border-radius:4px;
      background:linear-gradient(180deg, rgba(255,255,255,.60), rgba(226,236,246,.42));
      border:1px solid rgba(255,255,255,.72);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.25),
        0 4px 10px rgba(0,0,0,.08);
    }

    /* ===== 점선 ===== */
    .guide-line{
      position:absolute;
      height:0;
      border-top:6px dashed;
      z-index:5;
      transform-origin:left center;
      transition:left .35s ease, top .35s ease, width .35s ease, transform .35s ease, opacity .25s ease;
      pointer-events:none;
      opacity:0;
    }

    .guide-line.red{ border-color:var(--red-soft); }
    .guide-line.blue{ border-color:var(--blue-soft); }

    .scene.mode-default .guide-line{
      opacity:0;
    }

    .scene.mode-off .guide-line,
    .scene.mode-on .guide-line{
      opacity:1;
    }

    /* ===== 버튼 ===== */
    .prism-pill{
      position:absolute;
      left:50%;
      bottom:16px;
      transform:translateX(-50%);
      width:min(94%, 760px);
      height:82px;
      border-radius:999px;
      display:flex;
      align-items:center;
      padding:6px;
      gap:6px;
      z-index:10;
      background:linear-gradient(180deg, #ffffff 0%, #f5f8fc 100%);
      border:3px solid var(--pill-border);
      box-shadow:
        0 14px 26px rgba(0,0,0,.10),
        inset 0 1px 0 rgba(255,255,255,.92);
    }

    .pill-label{
      flex:0 0 110px;
      min-width:110px;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:28px;
      font-weight:900;
      color:#111;
      letter-spacing:-.5px;
      border-radius:999px;
      background:transparent;
      text-align:center;
      padding:0 10px;
      user-select:none;
    }

    .pill-btn{
      flex:1 1 0;
      height:100%;
      border-radius:999px;
      border:2.5px solid #144f7b;
      background:linear-gradient(180deg, #ffffff 0%, #eef4fb 100%);
      color:var(--pill-text);
      font-size:26px;
      font-weight:900;
      letter-spacing:-.4px;
      cursor:pointer;
      transition:all .22s ease;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.98),
        0 2px 8px rgba(0,0,0,.04);
    }

    .pill-btn.active{
      background:linear-gradient(180deg, #2b86ea 0%, #116bd3 100%);
      color:#fff;
      border-color:#0c4f9b;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.20),
        0 10px 18px rgba(0,94,184,.18);
    }

    .pill-btn:not(.active):active{
      transform:scale(.985);
    }

    .message{
      background:#dbe5f1;
      padding:28px 34px 30px;
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:20px;
      border-top:1px solid rgba(10,30,55,.08);
    }

    .message-copy{
      flex:1 1 auto;
      font-size:28px;
      line-height:1.34;
      font-weight:900;
      letter-spacing:-.6px;
      color:#000;
      word-break:keep-all;
    }

    .message-copy .blue{
      color:var(--acuvue-blue);
    }

    .confirm-btn{
      flex:0 0 auto;
      min-width:120px;
      height:86px;
      padding:0 26px;
      border:none;
      border-radius:18px;
      background:#1168d0;
      color:#fff;
      font-size:24px;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 10px 22px rgba(17,104,208,.22);
    }

    @media (max-width: 820px){
      .modal-title{ font-size:20px; }
      .scene{ height:520px; min-height:360px; }

      .target-stage{
        width:104px;
        height:158px;
      }
      .target-a{ font-size:90px; }

      .optic{
        width:48px;
        height:98px;
      }
      .optic-prism::before{
        border-left-width:24px;
        border-right-width:24px;
        border-bottom-width:82px;
      }
      .optic-prism::after{
        border-left-width:20px;
        border-right-width:20px;
        border-bottom-width:68px;
      }
      .optic-flat::before{
        width:28px;
        height:78px;
      }

      .prism-pill{ height:76px; }
      .pill-label,.pill-btn{ font-size:22px; }

      .message{
        padding:22px 18px 22px;
        gap:14px;
      }
      .message-copy{ font-size:22px; }
      .confirm-btn{
        min-width:98px;
        height:74px;
        font-size:20px;
        border-radius:16px;
      }
    }

    @media (max-width: 560px){
      .wrap{ padding:8px; }
      .modal{ width:100%; border-radius:20px; }
      .modal-head{
        height:60px;
        padding:0 18px;
      }
      .modal-title{ font-size:18px; }
      .modal-close{
        font-size:26px;
        width:34px;
        height:34px;
      }

      .scene{
        height:320px;
        min-height:320px;
      }

      .target-stage{
        width:82px;
        height:126px;
      }

      .target-box{
        border-radius:16px;
      }

      .scene.mode-on .box-top{ top:-10px; }
      .scene.mode-on .box-bottom{ top:10px; }

      .target-a{
        font-size:72px;
        letter-spacing:-4px;
      }

      .optic{
        width:38px;
        height:76px;
      }
      .optic-prism::before{
        border-left-width:20px;
        border-right-width:20px;
        border-bottom-width:62px;
      }
      .optic-prism::after{
        border-left-width:16px;
        border-right-width:16px;
        border-bottom-width:50px;
      }
      .optic-flat::before{
        width:24px;
        height:64px;
      }

      .guide-line{
        border-top-width:5px;
      }

      .prism-pill{
        width:min(94%, 520px);
        height:58px;
        bottom:10px;
        border-width:3px;
        gap:5px;
        padding:5px;
      }

      .pill-label{
        flex:0 0 72px;
        min-width:72px;
        font-size:14px;
        padding:0 6px;
      }

      .pill-btn{
        font-size:14px;
        border-width:2.5px;
        padding:0 6px;
      }

      .message{
        padding:18px 14px 18px;
        gap:12px;
      }
      .message-copy{
        font-size:17px;
        line-height:1.38;
      }
      .confirm-btn{
        min-width:82px;
        height:58px;
        font-size:16px;
        border-radius:14px;
        padding:0 18px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="modal">
      <div class="modal-head">
        <div class="modal-title">ASD™ 편안한 시야</div>
        <button class="modal-close" type="button" onclick="closeDemo()">X</button>
      </div>

      <div id="scene" class="scene mode-default">
        <div id="targetStage" class="target-stage">
          <div class="target-box box-top"></div>
          <div class="target-box box-bottom"></div>
          <div class="target-a a-red">A</div>
          <div class="target-a a-blue">A</div>
        </div>

        <div id="lineRed" class="guide-line red"></div>
        <div id="lineBlue" class="guide-line blue"></div>

        <div id="optic" class="optic">
          <div class="optic-prism"></div>
          <div class="optic-flat"></div>
        </div>

        <div class="prism-pill">
          <div class="pill-label">단안</div>
          <button id="btnOn" class="pill-btn" type="button">프리즘 유</button>
          <button id="btnOff" class="pill-btn" type="button">프리즘 무</button>
        </div>
      </div>

      <div class="message">
        <div id="messageCopy" class="message-copy">
          프리즘이 단안 난시 소비자에게 미치는 영향을
          <span class="blue">‘프리즘 유/무 버튼’</span>을 통해 확인해 보세요
        </div>
        <button class="confirm-btn" type="button" onclick="closeDemo()">확인</button>
      </div>
    </div>
  </div>

  <script>
    const scene = document.getElementById('scene');
    const btnOn = document.getElementById('btnOn');
    const btnOff = document.getElementById('btnOff');
    const messageCopy = document.getElementById('messageCopy');
    const targetStage = document.getElementById('targetStage');
    const optic = document.getElementById('optic');
    const lineRed = document.getElementById('lineRed');
    const lineBlue = document.getElementById('lineBlue');

    function setMode(mode){
      scene.classList.remove('mode-default', 'mode-on', 'mode-off');

      if(mode === 'on'){
        scene.classList.add('mode-on');
        btnOn.classList.add('active');
        btnOff.classList.remove('active');

        messageCopy.innerHTML = `
          단안 난시 소비자의 경우, 프리즘의 영향으로
          <span class="blue">양안의 이미지 위치에 차이가 발생하여 오후 피로감 발생 가능</span>
        `;
      }else if(mode === 'off'){
        scene.classList.add('mode-off');
        btnOn.classList.remove('active');
        btnOff.classList.add('active');

        messageCopy.innerHTML = `
          단안 난시 소비자의 경우, 프리즘의 영향이 없이
          <span class="blue">저녁까지 편안함과 선명함 제공</span>
        `;
      }else{
        scene.classList.add('mode-default');
        btnOn.classList.remove('active');
        btnOff.classList.remove('active');

        messageCopy.innerHTML = `
          프리즘이 단안 난시 소비자에게 미치는 영향을
          <span class="blue">‘프리즘 유/무 버튼’</span>을 통해 확인해 보세요
        `;
      }

      requestAnimationFrame(positionInteractiveElements);
    }

    btnOn.addEventListener('click', () => setMode('on'));
    btnOff.addEventListener('click', () => setMode('off'));

    function closeDemo(){
      alert('여기에 닫기 로직 연결');
    }

    function setCenterPercent(el, xPx, yPx, rect){
      el.style.left = ((xPx / rect.width) * 100) + '%';
      el.style.top  = ((yPx / rect.height) * 100) + '%';
    }

    function placeLine(el, sx, sy, ex, ey, rect){
      const dx = ex - sx;
      const dy = ey - sy;
      const length = Math.sqrt(dx * dx + dy * dy);
      const angle = Math.atan2(dy, dx) * 180 / Math.PI;

      el.style.left = (sx / rect.width * 100) + '%';
      el.style.top = (sy / rect.height * 100) + '%';
      el.style.width = length + 'px';
      el.style.transform = `rotate(${angle}deg)`;
    }

    function positionInteractiveElements(){
      const rect = scene.getBoundingClientRect();
      const w = rect.width;
      const h = rect.height;
      const mobile = w <= 560;
      const tablet = w <= 820 && w > 560;

      /* 눈 위치 */
      const eyeLeft = {
        x: w * 0.552,
        y: h * 0.408
      };

      const eyeRight = {
        x: w * 0.811,
        y: h * 0.410
      };

      /* 카드: 조금 더 아래 */
      const cardW = mobile ? 82 : (tablet ? 104 : 118);
      const cardH = mobile ? 126 : (tablet ? 158 : 176);
      const cardCx = w * 0.225;
      const cardCy = h * 0.500;

      targetStage.style.width = cardW + 'px';
      targetStage.style.height = cardH + 'px';
      setCenterPercent(targetStage, cardCx, cardCy, rect);

      /* 프리즘/플랫바: 현재 좋은 위치 유지 */
      const opticW = mobile ? 38 : (tablet ? 48 : 58);
      const opticH = mobile ? 76 : (tablet ? 98 : 118);
      const opticCx = eyeLeft.x + (mobile ? -1 : -2);
      const opticCy = eyeLeft.y + (mobile ? -2 : -2);

      optic.style.width = opticW + 'px';
      optic.style.height = opticH + 'px';
      setCenterPercent(optic, opticCx, opticCy, rect);

      const modeOn = scene.classList.contains('mode-on');
      const modeOff = scene.classList.contains('mode-off');

      /* 카드 오른쪽 끝 기준 */
      const startX = cardCx + cardW * 0.47;

      /* 프리즘 무 기준 눈 쪽 끝점: 절대 고정 */
      const offRedEndX = eyeLeft.x - (mobile ? 2 : 4);
      const offRedEndY = eyeLeft.y + (mobile ? 1 : 2);

      const offBlueEndX = eyeRight.x - (mobile ? 10 : 12);
      const offBlueEndY = eyeRight.y + (mobile ? 1 : 2);

      if(modeOn){
        lineRed.style.opacity = '1';
        lineBlue.style.opacity = '1';

        /* 프리즘 유:
           빨간 점선은 눈 쪽은 고정, 카드 쪽만 위로 */
        const onRedStartY = cardCy + cardH * 0.00;
        const onBlueStartY = cardCy + cardH * 0.20;

        placeLine(
          lineRed,
          startX,
          onRedStartY,
          offRedEndX,
          offRedEndY,
          rect
        );

        placeLine(
          lineBlue,
          startX,
          onBlueStartY,
          eyeRight.x - (mobile ? 10 : 12),
          eyeRight.y + (mobile ? 5 : 7),
          rect
        );

      }else if(modeOff){
        lineRed.style.opacity = '1';
        lineBlue.style.opacity = '1';

        /* 프리즘 무:
           카드 접점만 위로 */
        const offRedStartY = cardCy + cardH * 0.23;
        const offBlueStartY = cardCy + cardH * 0.30;

        placeLine(
          lineRed,
          startX,
          offRedStartY,
          offRedEndX,
          offRedEndY,
          rect
        );

        placeLine(
          lineBlue,
          startX,
          offBlueStartY,
          offBlueEndX,
          offBlueEndY,
          rect
        );

      }else{
        lineRed.style.opacity = '0';
        lineBlue.style.opacity = '0';
      }
    }

    window.addEventListener('load', positionInteractiveElements);
    window.addEventListener('resize', positionInteractiveElements);

    setMode('default');
  </script>
</body>
