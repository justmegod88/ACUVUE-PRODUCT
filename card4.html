<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>ASD™ 편안한 시야</title>

  <style>
    :root{
      --acuvue-blue:#005EB8;
      --acuvue-blue-2:#1E78D6;
      --panel-bg:#dfe8f3;
      --text:#0c1f35;
      --shadow:0 18px 44px rgba(10,30,55,.20);
      --blue-soft:#176fd6;
      --red-soft:#e02020;
      --pill-border:#0d4c78;
      --pill-text:#0d2138;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      height:100%;
      background:#000;
      font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",sans-serif;
      color:var(--text);
      overflow:hidden;
    }

    .wrap{
      min-height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:12px;
    }

    .modal{
      width:min(820px, 96vw);
      border-radius:24px;
      overflow:hidden;
      background:#fff;
      border:1px solid rgba(255,255,255,.18);
      box-shadow:var(--shadow);
    }

    .modal-head{
      height:76px;
      background:#dbe5f1;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 26px;
      border-bottom:1px solid rgba(10,30,55,.08);
    }

    .modal-title{
      font-size:28px;
      font-weight:900;
      color:#000;
      letter-spacing:-.5px;
    }

    .modal-close{
      border:none;
      background:transparent;
      font-size:34px;
      line-height:1;
      color:#000;
      cursor:pointer;
      padding:0;
      width:44px;
      height:44px;
    }

    .scene{
      position:relative;
      height:min(64vw, 540px);
      min-height:420px;
      background:#efefef url('face_V2.png') center center / cover no-repeat;
      overflow:hidden;
    }

    .scene::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(120px 150px at 30% 46%, rgba(255,255,255,.18), rgba(255,255,255,0) 62%),
        radial-gradient(120px 150px at 69% 46%, rgba(255,255,255,.14), rgba(255,255,255,0) 62%);
      pointer-events:none;
      z-index:0;
    }

    /* 중앙 카드형 시표 */
    .target-stage{
      position:absolute;
      left:50%;
      top:50.2%;
      width:154px;
      height:226px;
      transform:translate(-50%,-50%);
      z-index:4;
      pointer-events:none;
      opacity:0;
      transition:opacity .3s ease;
    }

    .scene.mode-on .target-stage,
    .scene.mode-off .target-stage{
      opacity:1;
    }

    .target-box{
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      width:100%;
      height:100%;
      border-radius:22px;
      border:2px solid rgba(255,255,255,.58);
      backdrop-filter: blur(1px);
      box-shadow:0 8px 24px rgba(0,0,0,.08);
      transition:all .5s cubic-bezier(.22,.8,.22,1);
    }

    .box-top{
      z-index:0;
      background:rgba(252,224,236,.34);
    }

    .box-bottom{
      z-index:0;
      background:rgba(223,232,255,.22);
    }

    .target-a{
      position:absolute;
      left:50%;
      transform:translate(-50%,-50%);
      font-size:132px;
      line-height:1;
      font-weight:300;
      letter-spacing:-8px;
      font-family:Georgia, "Times New Roman", serif;
      user-select:none;
      transition:
        top .55s cubic-bezier(.22,.8,.22,1),
        opacity .35s ease,
        transform .55s cubic-bezier(.22,.8,.22,1);
      z-index:2;
      text-shadow:0 2px 6px rgba(0,0,0,.05);
    }

    .a-red{ color:var(--red-soft); }
    .a-blue{ color:var(--blue-soft); }

    /* 기본 */
    .scene.mode-default .target-stage{
      opacity:0;
      pointer-events:none;
    }

    /* 프리즘 무 */
    .scene.mode-off .box-top,
    .scene.mode-off .box-bottom{
      top:0;
      opacity:.92;
    }

    .scene.mode-off .a-red{
      top:50%;
      opacity:.64;
      transform:translate(-50%,-50%);
      animation:none;
      color:#cf59dd;
    }

    .scene.mode-off .a-blue{
      top:50%;
      opacity:0;
      transform:translate(-50%,-50%);
    }

    /* 프리즘 유 */
    .scene.mode-on .box-top{
      top:-14px;
      opacity:.96;
      background:rgba(255,220,232,.48);
    }

    .scene.mode-on .box-bottom{
      top:14px;
      opacity:.86;
      background:rgba(218,235,255,.34);
    }

    .scene.mode-on .a-red{
      top:34%;
      opacity:1;
      transform:translate(-50%,-50%);
      color:var(--red-soft);
      animation:redFloat 1.45s ease-in-out infinite;
    }

    .scene.mode-on .a-blue{
      top:66%;
      opacity:1;
      transform:translate(-50%,-50%);
      color:var(--blue-soft);
    }

    @keyframes redFloat{
      0%   { transform:translate(-50%,-50%) translateY(0); }
      20%  { transform:translate(-50%,-50%) translateY(-6px); }
      45%  { transform:translate(-50%,-50%) translateY(2px); }
      70%  { transform:translate(-50%,-50%) translateY(-4px); }
      100% { transform:translate(-50%,-50%) translateY(0); }
    }

    /* 광학 요소: 소비자 왼쪽 눈(화면 오른쪽이 아니라 사용자가 원한 기준 반영 -> 화면 기준 왼쪽 눈 위) */
    .optic{
      position:absolute;
      left:36.2%;
      top:46.5%;
      width:68px;
      height:132px;
      transform:translate(-50%,-50%);
      z-index:6;
      transition:all .45s ease;
      pointer-events:none;
      opacity:0;
    }

    .scene.mode-on .optic,
    .scene.mode-off .optic{
      opacity:1;
    }

    .scene.mode-on .optic-prism{ display:block; }
    .scene.mode-on .optic-flat{ display:none; }

    .scene.mode-off .optic-prism{ display:none; }
    .scene.mode-off .optic-flat{ display:block; }

    .scene.mode-default .optic{ opacity:0; }

    .optic-prism,
    .optic-flat{
      position:absolute;
      inset:0;
    }

    .optic-prism::before{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      width:0;
      height:0;
      border-left:36px solid transparent;
      border-right:36px solid transparent;
      border-bottom:116px solid rgba(255,255,255,.42);
      filter:drop-shadow(0 4px 10px rgba(0,0,0,.10));
    }

    .optic-prism::after{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-46%);
      width:0;
      height:0;
      border-left:29px solid transparent;
      border-right:29px solid transparent;
      border-bottom:96px solid rgba(214,238,255,.28);
    }

    .optic-flat::before{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      width:46px;
      height:118px;
      border-radius:4px;
      background:linear-gradient(180deg, rgba(255,255,255,.56), rgba(227,236,246,.34));
      border:1px solid rgba(255,255,255,.72);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.20),
        0 4px 10px rgba(0,0,0,.08);
    }

    /* 점선 */
    .guide-line{
      position:absolute;
      height:0;
      border-top:7px dashed;
      z-index:5;
      transform-origin:left center;
      transition:all .45s ease;
      pointer-events:none;
      opacity:0;
    }

    .scene.mode-on .guide-line,
    .scene.mode-off .guide-line{
      opacity:1;
    }

    .scene.mode-default .guide-line{
      opacity:0;
    }

    .guide-line.red{
      left:34.8%;
      top:51.0%;
      width:104px;
      border-color:var(--red-soft);
    }

    .guide-line.blue{
      left:61.2%;
      top:49.0%;
      width:98px;
      border-color:var(--blue-soft);
    }

    .scene.mode-off .guide-line.red{
      transform:translate(0,0) rotate(18deg);
      width:78px;
    }

    .scene.mode-off .guide-line.blue{
      transform:translate(0,0) rotate(164deg);
      width:72px;
    }

    .scene.mode-on .guide-line.red{
      width:126px;
      transform:translate(0,-11px) rotate(8deg);
    }

    .scene.mode-on .guide-line.blue{
      width:116px;
      transform:translate(0,7px) rotate(160deg);
    }

    /* 버튼 */
    .prism-pill{
      position:absolute;
      left:50%;
      bottom:16px;
      transform:translateX(-50%);
      width:min(94%, 760px);
      height:92px;
      border-radius:999px;
      display:flex;
      align-items:center;
      padding:8px;
      gap:8px;
      z-index:10;
      background:linear-gradient(180deg, #ffffff 0%, #f4f8fd 100%);
      border:4px solid var(--pill-border);
      box-shadow:
        0 14px 26px rgba(0,0,0,.12),
        inset 0 1px 0 rgba(255,255,255,.85);
    }

    .pill-label{
      min-width:112px;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:29px;
      font-weight:900;
      color:#111;
      letter-spacing:-.5px;
      border-radius:999px;
      background:transparent;
      text-align:center;
      padding:0 12px;
      user-select:none;
      flex:0 0 auto;
    }

    .pill-btn{
      flex:1 1 0;
      height:100%;
      border-radius:999px;
      border:3px solid #144f7b;
      background:linear-gradient(180deg, #fdfefe 0%, #ecf3fb 100%);
      color:var(--pill-text);
      font-size:28px;
      font-weight:900;
      letter-spacing:-.4px;
      cursor:pointer;
      transition:all .22s ease;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.95),
        0 2px 8px rgba(0,0,0,.05);
    }

    .pill-btn.active{
      background:linear-gradient(180deg, #2b86ea 0%, #116bd3 100%);
      color:#fff;
      border-color:#0c4f9b;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.20),
        0 10px 18px rgba(0,94,184,.22);
    }

    .pill-btn:not(.active):active{
      transform:scale(.985);
    }

    /* 하단 메시지 */
    .message{
      background:#dbe5f1;
      padding:28px 34px 30px;
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:20px;
      border-top:1px solid rgba(10,30,55,.08);
    }

    .message-copy{
      flex:1 1 auto;
      font-size:28px;
      line-height:1.34;
      font-weight:900;
      letter-spacing:-.6px;
      color:#000;
      word-break:keep-all;
    }

    .message-copy .blue{
      color:var(--acuvue-blue);
    }

    .confirm-btn{
      flex:0 0 auto;
      min-width:120px;
      height:86px;
      padding:0 26px;
      border:none;
      border-radius:18px;
      background:#1168d0;
      color:#fff;
      font-size:24px;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 10px 22px rgba(17,104,208,.22);
    }

    @media (max-width: 820px){
      .modal-title{ font-size:20px; }
      .scene{ height:520px; min-height:360px; }

      .target-stage{ width:128px; height:192px; }
      .target-a{ font-size:108px; }

      .optic{ width:56px; height:108px; }
      .optic-prism::before{
        border-left-width:30px;
        border-right-width:30px;
        border-bottom-width:94px;
      }
      .optic-prism::after{
        border-left-width:24px;
        border-right-width:24px;
        border-bottom-width:78px;
      }
      .optic-flat::before{
        width:40px;
        height:100px;
      }

      .prism-pill{ height:80px; }
      .pill-label,.pill-btn{ font-size:22px; }

      .message{
        padding:22px 18px 22px;
        gap:14px;
      }
      .message-copy{ font-size:22px; }
      .confirm-btn{
        min-width:98px;
        height:74px;
        font-size:20px;
        border-radius:16px;
      }
    }

    @media (max-width: 560px){
      .wrap{ padding:8px; }
      .modal{ width:100%; border-radius:20px; }
      .modal-head{
        height:60px;
        padding:0 18px;
      }
      .modal-title{ font-size:18px; }
      .modal-close{
        font-size:26px;
        width:34px;
        height:34px;
      }

      .scene{
        height:320px;
        min-height:320px;
      }

      .target-stage{
        width:86px;
        height:132px;
        top:49.5%;
      }

      .target-box{
        border-radius:18px;
      }

      .scene.mode-on .box-top{ top:-10px; }
      .scene.mode-on .box-bottom{ top:10px; }

      .target-a{
        font-size:74px;
        letter-spacing:-4px;
      }

      .optic{
        left:35.2%;
        top:46.4%;
        width:42px;
        height:82px;
      }
      .optic-prism::before{
        border-left-width:22px;
        border-right-width:22px;
        border-bottom-width:70px;
      }
      .optic-prism::after{
        border-left-width:18px;
        border-right-width:18px;
        border-bottom-width:58px;
      }
      .optic-flat::before{
        width:28px;
        height:78px;
      }

      .guide-line{
        border-top-width:5px;
      }

      .guide-line.red{
        left:34.1%;
        top:51.4%;
      }

      .guide-line.blue{
        left:61.0%;
        top:49.2%;
      }

      .scene.mode-off .guide-line.red{
        width:50px;
        transform:translate(0,0) rotate(18deg);
      }

      .scene.mode-off .guide-line.blue{
        width:46px;
        transform:translate(0,0) rotate(164deg);
      }

      .scene.mode-on .guide-line.red{
        width:80px;
        transform:translate(0,-10px) rotate(8deg);
      }

      .scene.mode-on .guide-line.blue{
        width:74px;
        transform:translate(0,7px) rotate(160deg);
      }

      .prism-pill{
        width:min(94%, 520px);
        height:66px;
        bottom:10px;
        border-width:3px;
        gap:6px;
        padding:6px;
      }

      .pill-label{
        min-width:74px;
        font-size:15px;
        padding:0 8px;
      }

      .pill-btn{
        font-size:15px;
        border-width:3px;
        padding:0 8px;
      }

      .message{
        padding:18px 14px 18px;
        gap:12px;
      }

      .message-copy{
        font-size:17px;
        line-height:1.38;
      }

      .confirm-btn{
        min-width:82px;
        height:58px;
        font-size:16px;
        border-radius:14px;
        padding:0 18px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="modal">
      <div class="modal-head">
        <div class="modal-title">ASD™ 편안한 시야</div>
        <button class="modal-close" type="button" onclick="closeDemo()">X</button>
      </div>

      <div id="scene" class="scene mode-default">
        <div id="targetStage" class="target-stage">
          <div class="target-box box-top"></div>
          <div class="target-box box-bottom"></div>
          <div class="target-a a-red">A</div>
          <div class="target-a a-blue">A</div>
        </div>

        <div class="optic">
          <div class="optic-prism"></div>
          <div class="optic-flat"></div>
        </div>

        <div class="guide-line red"></div>
        <div class="guide-line blue"></div>

        <div class="prism-pill">
          <div class="pill-label">단안</div>
          <button id="btnOn" class="pill-btn" type="button">프리즘 유</button>
          <button id="btnOff" class="pill-btn" type="button">프리즘 무</button>
        </div>
      </div>

      <div class="message">
        <div id="messageCopy" class="message-copy">
          프리즘이 단안 난시 소비자에게 미치는 영향을
          <span class="blue">‘프리즘 유/무 버튼’</span>을 통해 확인해 보세요
        </div>
        <button class="confirm-btn" type="button" onclick="closeDemo()">확인</button>
      </div>
    </div>
  </div>

  <script>
    const scene = document.getElementById('scene');
    const btnOn = document.getElementById('btnOn');
    const btnOff = document.getElementById('btnOff');
    const messageCopy = document.getElementById('messageCopy');

    function setMode(mode){
      scene.classList.remove('mode-default','mode-on','mode-off');

      btnOn.classList.remove('active');
      btnOff.classList.remove('active');

      if(mode === 'default'){
        scene.classList.add('mode-default');
        messageCopy.innerHTML = `
          프리즘이 단안 난시 소비자에게 미치는 영향을
          <span class="blue">‘프리즘 유/무 버튼’</span>을 통해 확인해 보세요
        `;
        return;
      }

      if(mode === 'on'){
        scene.classList.add('mode-on');
        btnOn.classList.add('active');
        messageCopy.innerHTML = `
          단안 난시 소비자의 경우, 프리즘의 영향으로
          <span class="blue">양안의 이미지 위치에 차이가 발생하여 오후 피로감 발생 가능</span>
        `;
        return;
      }

      scene.classList.add('mode-off');
      btnOff.classList.add('active');
      messageCopy.innerHTML = `
        단안 난시 소비자의 경우, 프리즘의 영향이 없이
        <span class="blue">저녁까지 편안함과 선명함 제공</span>
      `;
    }

    btnOn.addEventListener('click', () => setMode('on'));
    btnOff.addEventListener('click', () => setMode('off'));

    function closeDemo(){
      alert('여기에 닫기 로직 연결');
    }

    /* 첫 화면 = 안내 기본 상태 */
    setMode('default');
  </script>
</body>
</html>
